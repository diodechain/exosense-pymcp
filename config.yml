# MCP Server Configuration
# Lists all available tools and their file locations

# Optional: set to true to auto-launch the Diode CLI and publish MCP at https://<client>.diode.link:PORT/mcp
# No external Diode client needed; this repo runs its own client (data in diode_client/).
auto-start-diode: true

# Optional: Diode join address for private networks. Omit or leave unset for public publish.
diode_join_address: "0x5d877ed61ecEc351a40c964516C998FecD458772"

# Optional: first port to try when finding a free port for the Diode API (default 30000).
# diode_api_port_start: 30000

